# 테스트 전용 설정 — 실 DB 없이(CI 포함) 컨텍스트가 뜨도록 인메모리 H2를 쓴다.
# H2는 PostgreSQL 호환 모드 — 플랫폼 저장소가 PostgreSQL 문법을 전제하기 때문.
spring:
  datasource:
    url: jdbc:h2:mem:dbtower;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    # 테스트에서는 Flyway를 끈다 — 마이그레이션(db/migration)은 PostgreSQL 문법 전제라
    # H2에서 돌리면 방언 차이를 좇는 이중 관리가 된다. H2는 스키마 검증 대상이 아니라
    # 컨텍스트 부팅용이므로, 스키마는 종전대로 Hibernate create-drop이 만든다.
    # 실제 스키마 검증은 본 설정의 ddl-auto=validate가 PostgreSQL 기동 시점에 수행한다.
    enabled: false
  # SPRING_SESSION은 엔티티가 아니라 Flyway(V15) 소유라 H2 create-drop이 만들지 않는다.
  # @EnableJdbcHttpSession은 Boot의 initialize-schema를 우회하므로, 테스트에선 spring-session이
  # 제공하는 H2 스키마 스크립트를 sql.init으로 직접 주입한다(운영은 Flyway가 만든다).
  sql:
    init:
      mode: always
      schema-locations: classpath:org/springframework/session/jdbc/schema-h2.sql
      # 인메모리 H2(DB_CLOSE_DELAY=-1)가 테스트 컨텍스트 간 공유돼 스크립트가 재실행되면
      # "already exists"가 난다 — 세션 테이블 생성은 멱등으로 취급(있으면 통과).
      continue-on-error: true

dbtower:
  snapshot:
    interval-ms: 3600000   # 테스트 중 폴러가 돌지 않게 사실상 정지
    retention-sweep-ms: 3600000
  regression:
    poll-ms: 3600000
  backup:
    poll-ms: 3600000
