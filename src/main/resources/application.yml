# 플랫폼 자체 메타데이터(레지스트리·스냅샷)는 PostgreSQL(dbtower 데이터베이스)에 저장한다.
# 처음엔 H2 파일이었지만, 플랫폼 자신을 관리 대상으로 등록해 자기 쿼리를 진단하는
# 도그푸딩(개선 아크 3)을 위해 Operator가 지원하는 기종으로 이전했다.
# 운영이라면 대상 DB와 물리적으로 분리된 전용 인스턴스를 쓴다 — 대상 장애가 플랫폼을 무너뜨리면 안 되므로.
spring:
  datasource:
    # reWriteBatchedInserts: JDBC 배치를 multi-values INSERT 한 문장으로 재작성 (개선 아크 2)
    # 접속 정보는 환경변수 우선, 없으면 로컬 docker compose 기본값.
    # 운영이라면 기본값 없이 시크릿 스토어(Vault/KMS)에서 주입하고, superuser가 아닌 전용 계정을 쓴다.
    url: ${DBTOWER_DB_URL:jdbc:postgresql://127.0.0.1:15432/dbtower?reWriteBatchedInserts=true}
    username: ${DBTOWER_DB_USERNAME:postgres}
    password: ${DBTOWER_DB_PASSWORD:dbtower1234}
  jpa:
    hibernate:
      # 스키마의 단일 권위는 Flyway(db/migration) — Hibernate는 만들지 않고 검증만 한다.
      # update는 기존 CHECK 제약을 갱신하지 않아 enum 확장 때 등록이 500으로 막혔다(VERIFICATION.md 18-3).
      # validate라 마이그레이션과 엔티티가 어긋나면 부팅이 실패한다 — 어긋남을 런타임이 아니라 기동 시점에 잡는다.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          # C-6: JDBC 드라이버가 TIMESTAMP를 읽고 쓸 때 쓰는 타임존을 UTC로 고정한다.
          # JVM 기본 TZ 고정(DbtowerApplication)과 짝을 이뤄, 노드 서버 TZ가 달라도 메타 DB에
          # 저장/조회되는 시각이 UTC로 일관된다. 저장 컬럼 타입(Instant) 변경은 범위 밖.
          time_zone: UTC
  session:
    # 공유 세션(Phase 3) — 세션을 메타 DB에 저장(재시작·다중 노드 생존). Servlet 세션 저장소를 JDBC로.
    store-type: jdbc
    jdbc:
      # 스키마의 단일 권위는 Flyway(V15)이므로 자동 생성을 끈다
      initialize-schema: never
  flyway:
    # 이미 테이블·데이터가 있는 DB에 Flyway를 도입할 때의 표준 절차 —
    # 기존 스키마를 V1(베이스라인)으로 표시만 하고 건너뛴다(비파괴). 빈 DB에는 V1부터 전부 실행된다.
    baseline-on-migrate: true

server:
  port: 8080

dbtower:
  # 웹 콘솔의 외부 접근 주소 (심화 아크 5 — 알림 → 진단 딥링크). 설정하면 회귀 알림에
  # "콘솔에서 진단" 링크(인스턴스 선택 + 자연어 진단 질문 프리필)가 붙는다. 빈 값이면 링크 생략.
  base-url: ${DBTOWER_BASE_URL:}
  # Prometheus HTTP API — Monitoring 탭 CPU·Connections 그래프와 (Phase 5) 디스크 예측의 시계열 소스.
  # 미설정/연결 불가면 그래프만 "미수집"으로 정직 표기되고 나머지 기능엔 영향 없다(기능 게이트).
  # 기본값은 데모 compose의 포트(19090) — datasource 기본값과 같은 데모 우선 원칙.
  prometheus:
    url: ${DBTOWER_PROMETHEUS_URL:http://localhost:19090}
  # 기종 정확성 (WS-C)
  oracle:
    # C-4: Oracle 통계(queryStats/slowQueries)를 볼 앱 스키마. 모니터 계정과 앱 스키마가 다를 때
    # (모니터≠앱) 필수 — 비우면 모니터 CURRENT_SCHEMA가 아니라 SYS/SYSTEM/DBSNMP/SYSMAN 시스템
    # 스키마만 제외하고 모든 앱 SQL을 본다. 특정 앱 스키마만 보려면 그 이름(대문자)을 지정한다.
    app-schema: ""
  pool:
    # 인스턴스별 HikariCP 최대 커넥션(B-7) — 한 인스턴스를 폴러 다수(스냅샷·운영경보·SLO·백업·이상·회귀·
    # Advisor·스코어)가 공유하는데 2였을 때 3번째 동시 접근이 대기→타임아웃→허위 백오프/수집정지 경보를 냈다.
    max-per-instance: 6
    connection-timeout-ms: 5000   # 커넥션 획득 대기 상한(B-7, 경합 시 여유)
    # 커넥션 온디맨드(Phase 4) — minimumIdle=0(코드 고정): 안 쓰는 대상에 유휴 커넥션을 꽂아두지 않는다.
    idle-timeout-ms: 600000       # 유휴 커넥션 유지(하한 가드: 수집 주기+30s 미만이면 강제 상향 — 틱마다 재연결 방지)
    max-lifetime-ms: 1800000      # 커넥션 최대 수명 — 방화벽/LB의 조용한 끊김보다 먼저 우리가 교체
    evict-after-minutes: 30       # 이 시간 미사용 풀은 통째로 close(격리·저빈도 대상). 0 이하=끔
    evict-sweep-ms: 300000        # 풀 정리 주기(5분)
  plan-snapshot:
    # plan_snapshot 보존(B-2) — 플랜 변경 감지가 append만 하고 삭제가 없어 무한 성장하던 것을,
    # (instance,query)별 최신 N개만 남긴다. 인덱스 조회는 최신만 보므로 옛 행은 읽히지 않고 쌓이기만 했다.
    retention-per-query: 20
    retention-sweep-ms: 3600000   # 보존 정리 주기(1시간)
  # A9 분석 보호장치: 모든 대상 DB 조회의 기본 상한(초). JDBC는 Statement.setQueryTimeout,
  # Mongo는 소켓 read 상한으로 적용된다. 진단 도구가 실수로 무거운 쿼리를 던져도 대상 DB를
  # 오래 붙잡지 않게 — "진단이 부하 유발자가 되면 안 된다"는 원칙. 심층 진단(explain 실제 실행)은
  # 이와 별개로 더 짧은 명시적 타임아웃을 건다.
  query-timeout-seconds: 15
  # 스케일 제어 (Phase F)
  scheduler:
    pool-size: 4         # @Scheduled 폴러 공용 스레드 풀 — 느린 폴러가 뒤 전부를 막는 head-of-line blocking 방지
  alert:
    rate-per-minute: 12  # 웹훅 알림 분당 상한 — 초과분은 버리지 않고 다음 허용 알림에 "N건 더" 합산
  snapshot:
    workers: 4           # 한 틱 안에서 인스턴스별 수집을 병렬 실행하는 워커 수(ShedLock 노드 배타는 유지)
    interval-ms: 60000   # 쿼리 통계 수집 주기
    # 수집 샤딩(Phase 4) — 샤드별 락(snapshot-collect-s)을 각각 시도해 획득한 샤드(instanceId % N)만
    # 수집한다. 노드가 여럿이면 자연 분산, 한 노드면 전 샤드 인수(페일오버). 1이면 현행과 동일.
    # 주의: 값 변경은 전 노드 동시 적용 — 노드마다 N이 다르면 담당 계산이 어긋나 중복 수집된다.
    shards: 1
    # 보존 정책 — 삭제 없이는 무한 적재라 메타 DB가 관리 대상보다 먼저 포화된다.
    # 기본 7일은 AWS RDS Performance Insights 선례(기본 보존 7일, 그 이상은 명시적 선택).
    # 0 이하면 보존 무제한(정리 안 함).
    retention-days: 7
    retention-sweep-ms: 3600000   # 보존 정리 주기(1시간) — 수집보다 훨씬 뜸해도 충분하다
  # 디스크 예측 지표 소스(Phase 5 소스 추상화) — prometheus(기본, 셀프호스트 node_exporter) |
  # cloudwatch(RDS — FreeStorageSpace, nodeFilter가 DBInstanceIdentifier). CloudWatch는 총 용량이
  # 메트릭에 없어 ETA 축만 동작(여유 %는 정직하게 미수집). 자격증명은 AWS 표준 체인(환경변수).
  disk-forecast:
    source: ${DBTOWER_DISK_FORECAST_SOURCE:prometheus}
  cloudwatch:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${DBTOWER_CLOUDWATCH_ENDPOINT:}   # LocalStack 등 호환 구현 검증용, 빈 값=AWS
  # Vault 동적 자격증명(선택, 하드닝 잔여) — 인스턴스 username을 "vault:<creds 경로>"로 등록하면
  # 접속 시점에 Vault database secrets engine에서 수명 있는 계정을 발급받아 쓴다(정적 비밀번호의
  # 유출 창을 TTL로 축소). 리스 80% 시점 선제 갱신 + 풀 자동 회전. 미설정 시 vault: 인스턴스는
  # 명확히 실패(조용한 오동작 방지). 적용 범위는 JDBC 풀 — 백업 CLI는 별도 계정 전제(한계 명시).
  vault:
    url: ${DBTOWER_VAULT_URL:}
    token: ${DBTOWER_VAULT_TOKEN:}
  # Discord 봇 인바운드(선택 모듈, 심화 아크 5 2단계) — 슬래시 커맨드로 자연어 진단.
  # 보안 3단계: Ed25519 요청 서명(공개키) + 채널 화이트리스트 + 유저 화이트리스트(둘 다 기본 거부).
  # 공개키 미설정 = 기능 끔(404). Discord 개발자 포털에서 앱 생성 → Interactions Endpoint URL에
  # {base-url}/api/inbound/discord 등록 → 앱 공개키/ID와 허용 채널·유저 ID를 아래에 주입.
  inbound:
    discord:
      public-key: ${DBTOWER_DISCORD_PUBLIC_KEY:}
      application-id: ${DBTOWER_DISCORD_APP_ID:}
      channel-allowlist: ${DBTOWER_DISCORD_CHANNELS:}
      user-allowlist: ${DBTOWER_DISCORD_USERS:}
  meta-backup:
    enabled: true          # 플랫폼 메타 DB(자기 자신) 자기 백업 — pg_dump가 없거나 메타가 PG가 아니면 조용히 스킵
    interval-ms: 86400000  # 자기 백업 주기(기본 24시간)
    retention-count: 7     # 로컬 보존 개수(최신 N개만)
  backup:
    dir: ./backups
    # 원격 보관(3-2-1의 오프사이트) — S3 호환(AWS S3·MinIO·R2). 자격증명은 환경변수로만
    # (DBTOWER_S3_ACCESS_KEY/SECRET_KEY). endpoint 비우면 AWS, 지정하면 MinIO 등 커스텀(path-style).
    # 업로드 실패는 백업 실패가 아니다 — 로컬 성공은 유효, remoteLocation만 비운다.
    remote:
      enabled: false
      endpoint: ""            # 예: http://127.0.0.1:19000 (로컬 MinIO 데모)
      bucket: dbtower-backups
      region: us-east-1
    # 백업 명령은 {host} {port} {user} {password} {db} 플레이스홀더 템플릿.
    # 실행 위치(호스트/컨테이너/에이전트)마다 접속 주소가 달라지는 현실을 설정이 흡수한다.
    # 로컬: mysqldump가 호스트에 없어 컨테이너 안에서 실행(컨테이너 관점이라 localhost:3306),
    #       호스트 pg_dump(14)가 서버(16)와 버전 불일치라 pg_dump도 컨테이너 것을 사용.
    # 비밀번호는 argv 금지 — MYSQL_PWD 환경변수로 전달되며, docker exec -e가 이를 컨테이너로 넘긴다
    mysqldump-command: "docker exec -e MYSQL_PWD dbtower-mysql mysqldump -h localhost -P 3306 -u {user} --single-transaction --databases {db}"
    pg-dump-command: "docker exec dbtower-postgres pg_dump -U {user} -d {db}"
    # 비밀번호는 --config /dev/stdin으로 표준입력 전달 (mongodump에는 비밀번호 환경변수가 없다)
    mongodump-command: "docker exec -i dbtower-mongo mongodump --host localhost --port 27017 -u {user} --authenticationDatabase admin --db {db} --archive --config /dev/stdin"
    # 로그 백업(Phase 2) — MySQL binlog 수집 명령의 접두부(파일 경로 인자는 Operator가 덧붙인다).
    # 로컬 데모: mysql:8.4 이미지에 mysqlbinlog가 없어(실측) FLUSH로 닫힌 binlog 물리 파일을 그대로 수집.
    # 프로덕션 예: "mysqlbinlog --read-from-remote-server --host {host} --port {port} --user {user}"
    #   (mysqlbinlog도 MYSQL_PWD를 읽는다 — argv 금지 규칙과 호환. 비면 로그 백업 UNSUPPORTED)
    mysql-binlog-command: "docker exec -w /var/lib/mysql dbtower-mysql cat"
    # MongoDB oplog 덤프 — 복제셋 전용(oplog.rs는 replSet에만 존재, Operator가 사전 게이트).
    # --oplog는 --db와 함께 못 쓰므로 local.oplog.rs를 직접 덤프한다(정석 증분 백업 방식).
    mongo-oplog-command: "docker exec -i dbtower-mongo mongodump --host localhost --port 27017 -u {user} --authenticationDatabase admin --db local --collection oplog.rs --archive --config /dev/stdin"
    # PostgreSQL WAL 세그먼트 수집 — pg_switch_wal()로 닫은 세그먼트를 수집(접두부 + 파일명 append).
    # 게이트: wal_level=minimal·pg_switch_wal 권한 부족·명령 미설정은 UNSUPPORTED.
    # 상시 아카이빙의 정석은 archive_command(서버 구성) 또는 pg_receivewal(스트리밍) — 폴러 원샷 모델의 대응이 이 방식.
    pg-wal-command: "docker exec -w /var/lib/postgresql/data/pg_wal dbtower-postgres cat"
    # Oracle 아카이브 로그 수집 — ARCHIVELOG 모드 게이트 + ALTER SYSTEM ARCHIVE LOG CURRENT 후
    # V$ARCHIVED_LOG 최신 파일(서버 절대경로)을 수집. 정석은 RMAN, 파일 복사도 공식 문서가 인정하는 방식.
    oracle-archivelog-command: "docker exec dbtower-oracle cat"
    # PG 물리 전체(PHYSICAL) — 시점 복구의 진짜 앵커. replication 프로토콜이라 서버 설정 불변,
    # tar를 stdout으로 받아 저장(-X none: WAL은 세그먼트 수집과 조합하는 것이 체인 정석).
    pg-basebackup-command: "docker exec dbtower-postgres pg_basebackup -h localhost -U {user} -D - -Ft -X none"
    # MySQL 물리 백업(XtraBackup) — 현업 주 백업의 정석. xtrabackup은 datadir 파일을 직접 읽어야
    # 해서(접속만으로 불가) 데모는 datadir 볼륨을 공유한 XtraBackup 컨테이너로 실행, 프로덕션은
    # DB 호스트의 xtrabackup 바이너리. 산출물은 xbstream을 stdout으로 받아 단일 파일(암호화 관문 통과).
    # 함정 두 겹(실측): xtrabackup은 MYSQL_PWD를 읽지 않고, defaults 로더는 /dev/stdin(파이프)을
    # 조용히 무시한다 — 비밀번호는 XB_CNF 환경변수 → 래퍼 스크립트(코드 소유)가 컨테이너 안
    # 임시 파일로 떨어뜨려 --defaults-extra-file로 읽는다(호스트·컨테이너 argv 모두 비노출).
    # 이 템플릿은 bash까지의 접두부, 인자는 아래 args가 담당(둘 다 필수).
    mysql-xtrabackup-command: "docker run --rm --user 0 -e XB_CNF -v dbtower_mysql-data:/var/lib/mysql:ro --network dbtower_default --entrypoint bash percona/percona-xtrabackup:8.4"
    mysql-xtrabackup-args: "--backup --stream=xbstream --host=mysql --port=3306 --user={user} --datadir=/var/lib/mysql --target-dir=/tmp"
    # 물리 산출물 검증 접두부(bash까지) — 스크립트(xbstream -x + xtrabackup --prepare)는 코드 소유.
    # prepare 성공 = 크래시 복구까지 적용된 "복원 가능한 물리 백업"의 실증.
    mysql-xtrabackup-verify-command: "docker run --rm -i --entrypoint bash percona/percona-xtrabackup:8.4"
    # 백업 산출물 암호화(3-2-1-1-0의 마지막 1) — base64 32바이트 키 설정 시 산출물을 AES-256-GCM으로
    # 암호화 저장(로컬·원격 모두 암호문). 복원 검증은 임시 평문으로 자동 복호. 미설정 = 현행 평문.
    # 한계(정직): MSSQL·Oracle 서버 사이드 백업은 대상 서버 디스크에 직접 쓰여 이 관문을 지나지 않는다.
    encryption-key: ${DBTOWER_BACKUP_ENCRYPTION_KEY:}
    # PG WAL 스트리밍(pg_receivewal) — 풀 방식의 "수집 주기 사이 세그먼트 재활용" 창을 없애는 정석.
    # 복제 슬롯(--slot)으로 수신자 공백 구간도 무손실. WalStreamManager가 상주 프로세스를 보살핀다
    # (30초 생존 점검·재시작). 빈 값 = 기능 끔. 슬롯은 배타적 — 노드 1곳에만 설정할 것.
    # 주의: 미소비 슬롯은 WAL 무한 보존(디스크 위험) — 끌 때 슬롯 삭제, 감시는 OpsAlert 슬롯 규칙이 담당.
    # 함정(실측): docker exec에 -i를 주면 원격 프로세스가 죽어도 CLI가 stdin EOF까지 살아남아
    # 생존 감시가 죽은 스트림을 살아있다고 오인한다 — pg_receivewal은 stdin이 필요 없으니 -i 금지.
    pg-receivewal-command: "docker exec -e PGPASSWORD dbtower-postgres pg_receivewal -h localhost -U {user} -D /var/backups/wal_stream --slot dbtower_wal"
    # Oracle RMAN(정석) — 지정 시 LOG/PHYSICAL이 RMAN(BACKUP ARCHIVELOG NOT BACKED UP 1 TIMES / BACKUP DATABASE)으로.
    # 데모 Oracle Free(26ai) 이미지에는 rman 바이너리가 없음을 실측 — 비워서 파일 수집 폴백/UNSUPPORTED 정직.
    # RMAN 가용 환경 예: "docker exec -i <ctr> rman" (접속·스크립트는 stdin — 비밀번호 argv 금지 규칙 호환)
    oracle-rman-command: ""
    # 복원 검증(A7) 명령 — 백업의 대칭. 임시/격리 대상에만 복원해 보고 원본은 건드리지 않는다.
    # 각 명령은 클라이언트 호출의 접두부만 정의하고(임시 DB 생성/적재/카운트/삭제 인자는 Operator가 덧붙임),
    # MySQL은 -e MYSQL_PWD로, PostgreSQL은 컨테이너 로컬 trust로 접속한다.
    mysql-restore-command: "docker exec -i -e MYSQL_PWD dbtower-mysql mysql -h localhost -P 3306 -u {user}"
    pg-restore-command: "docker exec -i dbtower-postgres psql -v ON_ERROR_STOP=1 -U {user}"
    # mongorestore는 --config /dev/stdin(비밀번호)이 stdin을 쓰므로 아카이브는 docker cp로 넣고 파일 경로로 준다
    mongo-restore-command: "docker exec -i dbtower-mongo mongorestore --host localhost --port 27017 -u {user} --authenticationDatabase admin --config /dev/stdin"
    poll-ms: 30000
    # 백업 신선도 임계(D7) — 마지막 성공 백업이 이 시간을 넘기면 STALE로 보고 경보한다.
    # DBA 일일 점검("모든 DB가 최근에 백업됐나")의 "최근"을 정의. 기본 24h(일 1회 백업 전제).
    freshness-hours: 24
  online-ddl:
    # 온라인 스키마 변경(gh-ost, MySQL 전용, B4). 대형 테이블 ALTER를 락 최소화로 수행한다.
    # 기본은 dry-run(noop) — 실제 변경은 요청 body의 execute=true를 명시할 때만.
    ghost-command: "gh-ost"
    # 환경별 안전 플래그. 로컬 도커는 포트 매핑(13306->3306)이라 gh-ost가 @@port(3306)와
    # 접속 포트(13306) 불일치를 거부하므로 --azure로 그 포트 검사만 우회한다(포트 매핑 없는 운영에선 제거).
    # --allow-on-master: 마스터 직결 허용, --assume-rbr: ROW 포맷 가정,
    # --initially-drop-ghost-table/--ok-to-drop-table: 이전 잔여물/원본 정리 허용.
    ghost-flags: "--allow-on-master --assume-rbr --initially-drop-ghost-table --ok-to-drop-table --azure"
    timeout-seconds: 1800   # gh-ost가 이 시간을 넘기면 중단(고스트 테이블 잔여물 확인 안내)
  regression:
    poll-ms: 120000       # 회귀 감지 주기
    recent-minutes: 5     # 문제 후보 구간(최근 N분)
    baseline-minutes: 15  # 베이스라인 구간(그 직전 N분)
    cooldown-minutes: 30  # 같은 쿼리 재알림 쿨다운
  baseline:
    # 이상 자동 감지(D1) — 고정 임계(regression)를 (요일×시간대) 동적 베이스라인으로 보완한다.
    poll-ms: 120000        # 베이스라인 이상 감지 주기
    history-days: 14       # 학습에 쓸 과거 이력 길이(이 안의 같은 요일·시간대 관측만 베이스라인)
    recent-minutes: 5      # 베이스라인과 비교할 현재 구간 길이
    z-threshold: 3.0       # 이상 판정 임계(표준편차 몇 배 이탈) — AWS 계열 관례인 3σ
    min-observations: 8    # 버킷당 최소 관측 수 — 미만이면 "학습 중"으로 판정 보류(신규 오탐 방지)
    cooldown-minutes: 30   # 같은 쿼리 재알림 쿨다운
  ops-alert:
    # 운영 신호 감지(B5) — 쿼리 회귀 밖의 이상 징후(장기 유휴 트랜잭션·복제 지연·수집 정지)를
    # 기존 진단(activeSessions·replicationState)과 메타 DB로 잡아 웹훅으로 알린다.
    poll-ms: 120000              # 운영 감지 주기
    idle-txn-seconds: 300        # idle in transaction 세션이 이 시간을 넘으면 경보(락·VACUUM 차단 위험)
    replication-lag-seconds: 30  # 복제 지연이 이 초를 넘으면 경보(STANDALONE·음수 lag은 스킵)
    snapshot-stall-minutes: 10   # 이 시간 동안 신규 스냅샷 배치가 0이면 수집 정지로 판단(선택 규칙)
    cooldown-minutes: 30         # 같은 신호 재알림 쿨다운
    slot-retained-mb: 1024       # 비활성 복제 슬롯(PG)이 이 MB 이상 WAL을 붙잡으면 경보(디스크 고갈 위험)
  slo:
    # DB SLO / 에러 버짓 (D4) — Google SRE·DBRE 모델. "인프라 지표(CPU)가 아니라 사용자 경험 지표".
    # 목표는 우선 전역 기본값 하나만 둔다 — 인스턴스별 목표(per-instance target)는 향후 확장 여지로 남긴다
    # (테이블/컬럼을 추가해 인스턴스마다 target을 오버라이드하는 식). 지금은 전역 기본값이 모든 인스턴스에 적용된다.
    availability:
      target: 0.995            # 가용성 SLO 목표(99.5% → 월 3.6h 다운 허용). 향후 per-instance 오버라이드 여지.
      poll-ms: 60000           # 헬스 샘플 수집 주기 = 버짓 산식의 샘플 간격(다운 샘플 1개 ≈ 이 시간의 다운타임)
      window-days: 30          # 에러 버짓 회계 기간(이 기간 누적으로 소진율 계산)
      burn-window-minutes: 60  # 번인 레이트 최근 창(이 창의 소진 속도)
      retention-days: 35       # 헬스 샘플 보존(회계 기간보다 약간 길게 — 버짓이 회계 기간 전체를 훑을 수 있게). 0 이하면 무제한
      retention-sweep-ms: 3600000  # 헬스 샘플 보존 정리 주기(1시간)
      min-samples: 5           # 이보다 표본이 적으면 "데이터 부족"으로 판정 보류(짧은 이력의 과대 판정 방지)
    latency:
      p95-threshold-ms: 100    # 레이턴시 SLO — 핵심 쿼리 p95 임계(ms). 향후 per-instance 오버라이드 여지.
      sample-limit: 20         # 핵심 쿼리 상위 N(부하 순) — D4a latencyPercentiles에 넘길 limit
  score:
    refresh-ms: 60000          # 헬스 스코어 캐시 갱신 주기(Phase F) — 조회는 캐시 반환, 매 조회마다 재계산 안 함
    # 통합 헬스 스코어(D8) 감점 가중치 — 100점에서 신호별 감점을 뺀다. 데이터 부족은 감점이 아니라 부분 데이터로 격리.
    weights:
      health-down: 45          # health가 down이면(치명) 단독으로 F에 근접시키도록 크게 잡는다
      anomaly-per-hit: 4       # 이상 쿼리 1건당 감점
      anomaly-cap: 16          # 이상 감지 신호의 감점 상한(한 신호가 점수를 독식하지 않게)
      advisor-critical: 8      # Advisor CRITICAL 1건당 감점
      advisor-warning: 3       # Advisor WARNING 1건당 감점
      advisor-cap: 30          # Advisor 신호의 감점 상한
      slo-breaching: 25        # SLO 위반(BREACHING) 감점
      slo-at-risk: 10          # SLO 위험(AT_RISK) 감점
      backup-no-backup: 20     # 백업 없음(사각지대) 감점 — 데이터 부족이 아니라 실제 위험
      backup-stale: 12         # 백업 오래됨(STALE) 감점
  ai:
    model: claude-opus-4-8
  security:
    # 기계(MCP 클라이언트·자동화)용 서비스 토큰 — 미설정이면 기동마다 랜덤 생성 (fail-closed)
    api-token: ${DBTOWER_API_TOKEN:}
    # 최초 기동 부트스트랩 — admin은 항상 생성(비밀번호 미설정 시 랜덤+로그 안내),
    # viewer(조회·진단 전용)는 비밀번호를 준 경우에만 생성
    admin-password: ${DBTOWER_ADMIN_PASSWORD:}
    viewer-password: ${DBTOWER_VIEWER_PASSWORD:}
    # 인스턴스 비밀번호 암호화 키 — base64 인코딩 32바이트 (생성: openssl rand -base64 32).
    # 미설정이면 평문 저장으로 기동하되 WARN 로그로 경고 (fail-open 근거는 SecretCipher 주석)
    encryption-key: ${DBTOWER_ENCRYPTION_KEY:}
    rules-path: docs/ai-analysis-rules.md
    # 로그인 브루트포스 방어 — 계정별 연속 실패 임계·잠금 시간
    login-lock:
      max-attempts: 10
      lock-minutes: 15
    # 세션·CSRF 쿠키 Secure 플래그(프록시 HTTPS 종단 시 true). application-docker.yml에서 override
    cookie-secure: false
# 웹훅 URL은 비밀값 — 환경변수 DBTOWER_WEBHOOK_URL로만 주입 (Discord/Slack 자동 판별)

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

# 로깅 (Phase 1): 기본은 콘솔(컨테이너 표준출력 = docker logs·수집기 친화). LOGGING_FILE_NAME 또는
# LOGGING_FILE_PATH(스프링 부트 표준) 환경변수를 주면 롤링 파일 로깅이 켜진다 — 아래 정책이 적용된다.
# JSON 구조화 로깅은 범위 밖(수집기에서 파싱).
logging:
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 14
      total-size-cap: 500MB
