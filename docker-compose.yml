services:
  mysql:
    image: mysql:8.4
    container_name: dbtower-mysql
    environment:
      MYSQL_ROOT_PASSWORD: dbtower1234
      MYSQL_DATABASE: sample
    # 슬로우 쿼리를 mysql.slow_log 테이블로 남겨 플랫폼이 조회할 수 있게 한다
    command: >
      --slow_query_log=ON
      --log_output=TABLE
      --long_query_time=0.5
      --max_digest_length=4096
      --performance_schema_max_digest_length=4096
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  postgres:
    image: postgres:16
    container_name: dbtower-postgres
    environment:
      POSTGRES_PASSWORD: dbtower1234
      POSTGRES_DB: sample
    # 쿼리 통계 수집을 위한 pg_stat_statements 프리로드
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dbtower-mssql
    platform: linux/amd64   # Apple Silicon에서는 Docker Desktop Rosetta 에뮬레이션 필요
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dbtower1234!"
    ports:
      - "11433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  mongo:
    image: mongo:7
    container_name: dbtower-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: dbtower1234
    # 프로파일러 레벨 2 — 모든 연산을 system.profile에 기록 (플랫폼의 통계 소스)
    command: ["mongod", "--auth", "--profile", "2", "--slowms", "0"]
    ports:
      - "17017:27017"
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js

  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: dbtower-oracle
    environment:
      ORACLE_PASSWORD: dbtower1234
      APP_USER: sample
      APP_USER_PASSWORD: dbtower1234
    ports:
      - "11521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      # V$ 뷰 조회·Data Pump 권한 부여 + 시드 (최초 기동 시 1회)
      - ./docker/oracle-init.sql:/container-entrypoint-initdb.d/init.sql

  # ===== 확장2: 통합 모니터링 =====
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: dbtower-mysqld-exporter
    command:
      - "--mysqld.address=mysql:3306"
      - "--mysqld.username=root"
    environment:
      MYSQLD_EXPORTER_PASSWORD: dbtower1234
    depends_on:
      - mysql

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: dbtower-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:dbtower1234@postgres:5432/sample?sslmode=disable"
    depends_on:
      - postgres

  # 호스트 수준 지표(CPU·디스크) — DB 컨테이너들이 공유하는 노드의 자원. 레퍼런스의 CPU% 그래프 대응이며,
  # Phase 5 디스크 포화 예측(predict_linear)의 데이터 소스이기도 하다.
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: dbtower-node-exporter
    ports:
      - "19100:9100"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: dbtower-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "19090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # DBTower 앱(호스트 8080)의 /actuator/prometheus 수집용

  grafana:
    image: grafana/grafana:11.1.0
    container_name: dbtower-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: dbtower1234
    volumes:
      - ./docker/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml
    ports:
      - "13000:3000"
    depends_on:
      - prometheus

  # 백업 원격 보관 데모(3-2-1의 오프사이트) — S3 호환 API. 클라우드 계정 없이 로컬에서
  # "백업 -> 원격 업로드"를 실측하기 위한 것. 콘솔: http://localhost:19001
  minio:
    image: minio/minio:latest
    container_name: dbtower-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dbtower
      MINIO_ROOT_PASSWORD: dbtower1234
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  postgres-data:
  mssql-data:
  mongo-data:
  oracle-data:
  minio-data:
