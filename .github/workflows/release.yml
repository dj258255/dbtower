name: Release

# v1.2.3 형태의 태그를 push 하면 이미지를 빌드해 GHCR 에 게시한다.
#   git tag v1.0.0 && git push origin v1.0.0
# 게시는 사용자가 태그를 push 할 때만 일어난다(수동 트리거도 허용).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR push 에 필요
    steps:
      - uses: actions/checkout@v4

      # 이미지에 넣는 jar 는 Dockerfile 안에서 빌드되지만, 게시 전 테스트로 게이트한다.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Test (게시 전 게이트)
        run: ./gradlew test

      # gha 캐시(cache-to type=gha)는 기본 docker 드라이버가 지원하지 않는다 —
      # docker-container 드라이버를 쓰는 buildx 셋업이 필요 (첫 릴리스에서 실측한 실패)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 태그(v1.0.0)에서 1.0.0, 1.0, 1, latest 태그를 자동 생성
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
