<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <style>
    .bg    { fill:#ffffff; }
    .card  { fill:#f8fafc; stroke:#cbd5e1; }
    .app   { fill:none;    stroke:#6366f1; stroke-width:2; }
    .l1    { fill:#eef2ff; stroke:#c7d2fe; }
    .l2    { fill:#ecfdf5; stroke:#a7f3d0; }
    .l3    { fill:#fffbeb; stroke:#fde68a; }
    .l4    { fill:#fdf2f8; stroke:#fbcfe8; }
    .chip  { fill:#ffffff; stroke:#cbd5e1; }
    .title { fill:#0f172a; font-weight:700; }
    .sub   { fill:#475569; }
    .label { fill:#334155; }
    .appname { fill:#4338ca; font-weight:700; letter-spacing:.5px; }
    .lane  { fill:#4338ca; font-weight:700; }
    .note  { fill:#64748b; }
    .a-req { stroke:#6366f1; fill:none; stroke-width:2; }
    .a-res { stroke:#64748b; fill:none; stroke-width:2; }
    .a-obs { stroke:#64748b; fill:none; stroke-width:1.6; stroke-dasharray:5 4; }
    .h-req { fill:#6366f1; }
    .h-res { fill:#64748b; }
    @media (prefers-color-scheme: dark) {
      .bg    { fill:#0b1220; }
      .card  { fill:#111827; stroke:#334155; }
      .app   { stroke:#818cf8; }
      .l1    { fill:#1e1b4b; stroke:#3730a3; }
      .l2    { fill:#052e2b; stroke:#134e4a; }
      .l3    { fill:#2a2005; stroke:#713f12; }
      .l4    { fill:#500724; stroke:#831843; }
      .chip  { fill:#0b1220; stroke:#334155; }
      .title { fill:#e2e8f0; }
      .sub   { fill:#94a3b8; }
      .label { fill:#cbd5e1; }
      .appname { fill:#a5b4fc; }
      .lane  { fill:#a5b4fc; }
      .note  { fill:#94a3b8; }
      .a-req { stroke:#818cf8; }
      .a-res { stroke:#94a3b8; }
      .a-obs { stroke:#94a3b8; }
      .h-req { fill:#818cf8; }
      .h-res { fill:#94a3b8; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="1400" height="1080" rx="14"/>
  <text class="title" x="700" y="36" font-size="18" text-anchor="middle">DBTower 상세 아키텍처 — 채널 3종 · 모듈 14개 · 관제 대상 5기종</text>
  <text class="sub"   x="700" y="58" font-size="12.5" text-anchor="middle">포트는 docker-compose 호스트 매핑 · 모듈명은 io.dbtower 하위 패키지(패키지 = Spring Modulith 모듈)</text>

  <!-- ===== 채널 3종 ===== -->
  <rect class="card" x="120" y="82" width="280" height="72" rx="10"/>
  <text class="title" x="260" y="110" font-size="13.5" text-anchor="middle">웹 콘솔 (사람)</text>
  <text class="sub"   x="260" y="132" font-size="11" text-anchor="middle">의존성 0 정적 SPA · 세션 로그인</text>

  <rect class="card" x="440" y="82" width="280" height="72" rx="10"/>
  <text class="title" x="580" y="110" font-size="13.5" text-anchor="middle">MCP 클라이언트 (AI 에이전트)</text>
  <text class="sub"   x="580" y="132" font-size="11" text-anchor="middle">JSON-RPC 2.0 · Bearer 토큰 (pull)</text>

  <rect class="card" x="760" y="82" width="280" height="72" rx="10"/>
  <text class="title" x="900" y="110" font-size="13.5" text-anchor="middle">웹훅 (온콜)</text>
  <text class="sub"   x="900" y="132" font-size="11" text-anchor="middle">Discord/Slack push · 회귀·이상·운영 경보</text>

  <path class="a-req" d="M260 154 L260 196"/>
  <polygon class="h-req" points="260,196 255,186 265,186"/>
  <path class="a-req" d="M580 154 L580 196"/>
  <polygon class="h-req" points="580,196 575,186 585,186"/>
  <path class="a-res" d="M900 196 L900 154"/>
  <polygon class="h-res" points="900,154 895,164 905,164"/>
  <text class="label" x="962" y="180" font-size="10.5" text-anchor="middle">alert가 push</text>

  <!-- ===== DBTower 앱 ===== -->
  <rect class="app" x="100" y="200" width="940" height="560" rx="14"/>
  <text class="appname" x="570" y="226" font-size="14.5" text-anchor="middle">DBTower 앱 — Spring Boot 4.1 · Spring Modulith 2.1 · :8080</text>

  <!-- 층 1: 채널·경계 -->
  <rect class="l1" x="120" y="240" width="900" height="102" rx="9"/>
  <text class="lane" x="132" y="260" font-size="12">채널·경계 층</text>
  <rect class="chip" x="128" y="270" width="286" height="62" rx="7"/>
  <text class="title" x="271" y="292" font-size="12" text-anchor="middle">security</text>
  <text class="sub"   x="271" y="308" font-size="10.5" text-anchor="middle">세션(BCrypt) + Bearer 서비스 토큰</text>
  <text class="sub"   x="271" y="323" font-size="10.5" text-anchor="middle">대상 DB 비밀번호 AES-256-GCM 저장</text>
  <rect class="chip" x="426" y="270" width="286" height="62" rx="7"/>
  <text class="title" x="569" y="292" font-size="12" text-anchor="middle">mcp</text>
  <text class="sub"   x="569" y="308" font-size="10.5" text-anchor="middle">JSON-RPC 2.0 직접 구현 · 도구 14종</text>
  <text class="sub"   x="569" y="323" font-size="10.5" text-anchor="middle">stdio·HTTP 두 전송이 코어 공유</text>
  <rect class="chip" x="724" y="270" width="286" height="62" rx="7"/>
  <text class="title" x="867" y="292" font-size="12" text-anchor="middle">audit</text>
  <text class="sub"   x="867" y="308" font-size="10.5" text-anchor="middle">감사 인터셉터 — 누가·언제·무엇을</text>
  <text class="sub"   x="867" y="323" font-size="10.5" text-anchor="middle">했고 결과가 어땠나(메타 DB 기록)</text>

  <!-- 층 2: 도메인·수집 -->
  <rect class="l2" x="120" y="356" width="900" height="102" rx="9"/>
  <text class="lane" x="132" y="376" font-size="12">도메인·수집 층 (주기 폴러)</text>
  <rect class="chip" x="128" y="386" width="212" height="62" rx="7"/>
  <text class="title" x="234" y="406" font-size="12" text-anchor="middle">registry</text>
  <text class="sub"   x="234" y="422" font-size="10.5" text-anchor="middle">인스턴스 등록·헬스 (중심 도메인)</text>
  <text class="sub"   x="234" y="437" font-size="10.5" text-anchor="middle">collection_enabled 격리 토글</text>
  <rect class="chip" x="352" y="386" width="212" height="62" rx="7"/>
  <text class="title" x="458" y="406" font-size="12" text-anchor="middle">insight</text>
  <text class="sub"   x="458" y="422" font-size="10.5" text-anchor="middle">쿼리 스냅샷 폴러 · 시점 비교(차분)</text>
  <text class="sub"   x="458" y="437" font-size="10.5" text-anchor="middle">JDBC batch 저장 · EXPLAIN API</text>
  <rect class="chip" x="576" y="386" width="212" height="62" rx="7"/>
  <text class="title" x="682" y="406" font-size="12" text-anchor="middle">slo</text>
  <text class="sub"   x="682" y="422" font-size="10.5" text-anchor="middle">헬스 샘플러(60s) · 가용성 SLI</text>
  <text class="sub"   x="682" y="437" font-size="10.5" text-anchor="middle">p95/p99 레이턴시 · 에러 버짓</text>
  <rect class="chip" x="800" y="386" width="212" height="62" rx="7"/>
  <text class="title" x="906" y="406" font-size="12" text-anchor="middle">backup</text>
  <text class="sub"   x="906" y="422" font-size="10.5" text-anchor="middle">정책 폴러(FULL/LOG) · 복원 검증</text>
  <text class="sub"   x="906" y="437" font-size="10.5" text-anchor="middle">신선도 감시 · 원격 업로드</text>

  <!-- 층 3: 분석·판정 -->
  <rect class="l3" x="120" y="472" width="900" height="102" rx="9"/>
  <text class="lane" x="132" y="492" font-size="12">분석·판정 층 (읽고 조언만 — 대상 DB를 바꾸지 않음)</text>
  <rect class="chip" x="128" y="502" width="168" height="62" rx="7"/>
  <text class="title" x="212" y="522" font-size="12" text-anchor="middle">analysis</text>
  <text class="sub"   x="212" y="538" font-size="10.5" text-anchor="middle">실행계획 규칙 판정</text>
  <text class="sub"   x="212" y="553" font-size="10.5" text-anchor="middle">+ AI 1차 분석</text>
  <rect class="chip" x="306" y="502" width="168" height="62" rx="7"/>
  <text class="title" x="390" y="522" font-size="12" text-anchor="middle">alert</text>
  <text class="sub"   x="390" y="538" font-size="10.5" text-anchor="middle">회귀 4규칙 · 이상 z-score</text>
  <text class="sub"   x="390" y="553" font-size="10.5" text-anchor="middle">플랜 변경 · 데드락·복제 경보</text>
  <rect class="chip" x="484" y="502" width="168" height="62" rx="7"/>
  <text class="title" x="568" y="522" font-size="12" text-anchor="middle">advisor</text>
  <text class="sub"   x="568" y="538" font-size="10.5" text-anchor="middle">자동 점검 일일 스윕</text>
  <text class="sub"   x="568" y="553" font-size="10.5" text-anchor="middle">(bloat·중복 인덱스·권한...)</text>
  <rect class="chip" x="662" y="502" width="168" height="62" rx="7"/>
  <text class="title" x="746" y="522" font-size="12" text-anchor="middle">finops</text>
  <text class="sub"   x="746" y="538" font-size="10.5" text-anchor="middle">낭비 신호 — 미사용 인덱스</text>
  <text class="sub"   x="746" y="553" font-size="10.5" text-anchor="middle">·큰 테이블·오버프로비저닝</text>
  <rect class="chip" x="840" y="502" width="168" height="62" rx="7"/>
  <text class="title" x="924" y="522" font-size="12" text-anchor="middle">score</text>
  <text class="sub"   x="924" y="538" font-size="10.5" text-anchor="middle">통합 헬스 스코어</text>
  <text class="sub"   x="924" y="553" font-size="10.5" text-anchor="middle">(다섯 신호 감점 합산)</text>

  <!-- 층 4: 기종 어댑터 -->
  <rect class="l4" x="120" y="588" width="900" height="152" rx="9"/>
  <text class="lane" x="132" y="608" font-size="12">기종 어댑터 층 — operator · onlineddl</text>
  <text class="label" x="570" y="628" font-size="11" text-anchor="middle">DbmsOperator 인터페이스(경계는 SQL이 아니라 "운영 행위") — 기종 분기는 DbmsOperatorFactory 한 곳</text>
  <rect class="chip" x="136" y="640" width="164" height="34" rx="7"/>
  <text class="label" x="218" y="661" font-size="11" text-anchor="middle">MySqlOperator</text>
  <rect class="chip" x="312" y="640" width="164" height="34" rx="7"/>
  <text class="label" x="394" y="661" font-size="11" text-anchor="middle">PostgresOperator</text>
  <rect class="chip" x="488" y="640" width="164" height="34" rx="7"/>
  <text class="label" x="570" y="661" font-size="11" text-anchor="middle">MsSqlOperator</text>
  <rect class="chip" x="664" y="640" width="164" height="34" rx="7"/>
  <text class="label" x="746" y="661" font-size="11" text-anchor="middle">OracleOperator</text>
  <rect class="chip" x="840" y="640" width="164" height="34" rx="7"/>
  <text class="label" x="922" y="661" font-size="11" text-anchor="middle">MongoOperator</text>
  <text class="note" x="570" y="700" font-size="10.5" text-anchor="middle">보호장치(A9): 모든 대상 조회 쿼리 타임아웃 15s · 연속 실패 인스턴스 지수 백오프 · 인스턴스별 HikariCP 풀(최대 6)</text>
  <text class="note" x="570" y="720" font-size="10.5" text-anchor="middle">onlineddl: gh-ost 오케스트레이션 — MySQL 전용 · 기본 dry-run · MCP 비노출 (유일한 파괴적 기능)</text>

  <!-- ===== 앱 -> 관제 대상 ===== -->
  <path class="a-req" d="M218 760 L218 826"/>
  <polygon class="h-req" points="218,826 213,816 223,816"/>
  <path class="a-req" d="M394 760 L394 826"/>
  <polygon class="h-req" points="394,826 389,816 399,816"/>
  <path class="a-req" d="M570 760 L570 826"/>
  <polygon class="h-req" points="570,826 565,816 575,816"/>
  <path class="a-req" d="M746 760 L746 826"/>
  <polygon class="h-req" points="746,826 741,816 751,816"/>
  <path class="a-req" d="M922 760 L922 826"/>
  <polygon class="h-req" points="922,826 917,816 927,816"/>
  <text class="label" x="570" y="790" font-size="10.5" text-anchor="middle">JdbcTemplate / Mongo 드라이버 — 시스템 뷰 조회 중심</text>

  <!-- ===== 관제 대상 5기종 ===== -->
  <rect class="card" x="120" y="826" width="900" height="118" rx="10"/>
  <text class="title" x="132" y="850" font-size="12.5">관제 대상 5기종 (docker-compose 데모 — 셀프호스트는 사용자의 기존 DB를 등록)</text>
  <rect class="chip" x="136" y="864" width="164" height="64" rx="7"/>
  <text class="title" x="218" y="888" font-size="11.5" text-anchor="middle">MySQL 8.4</text>
  <text class="sub"   x="218" y="906" font-size="10.5" text-anchor="middle">:13306</text>
  <rect class="chip" x="312" y="864" width="164" height="64" rx="7"/>
  <text class="title" x="394" y="888" font-size="11.5" text-anchor="middle">PostgreSQL 16</text>
  <text class="sub"   x="394" y="906" font-size="10.5" text-anchor="middle">:15432</text>
  <rect class="chip" x="488" y="864" width="164" height="64" rx="7"/>
  <text class="title" x="570" y="888" font-size="11.5" text-anchor="middle">SQL Server 2022</text>
  <text class="sub"   x="570" y="906" font-size="10.5" text-anchor="middle">:11433</text>
  <rect class="chip" x="664" y="864" width="164" height="64" rx="7"/>
  <text class="title" x="746" y="888" font-size="11.5" text-anchor="middle">Oracle 23 Free</text>
  <text class="sub"   x="746" y="906" font-size="10.5" text-anchor="middle">:11521</text>
  <rect class="chip" x="840" y="864" width="164" height="64" rx="7"/>
  <text class="title" x="922" y="888" font-size="11.5" text-anchor="middle">MongoDB 7</text>
  <text class="sub"   x="922" y="906" font-size="10.5" text-anchor="middle">:17017</text>

  <!-- ===== 오른쪽: 외부 의존 ===== -->
  <rect class="card" x="1090" y="200" width="280" height="120" rx="10"/>
  <text class="title" x="1230" y="228" font-size="13" text-anchor="middle">메타 PostgreSQL 16</text>
  <text class="sub"   x="1230" y="250" font-size="10.5" text-anchor="middle">dev :15432 · 셀프호스트 meta-db 컨테이너</text>
  <text class="sub"   x="1230" y="268" font-size="10.5" text-anchor="middle">Flyway V1~V23 · 핵심 표 9개 (docs/erd.svg)</text>
  <text class="sub"   x="1230" y="286" font-size="10.5" text-anchor="middle">ddl-auto=validate — 스키마 권위는 Flyway</text>
  <path class="a-req" d="M1040 258 L1084 258"/>
  <polygon class="h-req" points="1084,258 1074,253 1074,263"/>

  <rect class="card" x="1090" y="352" width="280" height="96" rx="10"/>
  <text class="title" x="1230" y="380" font-size="13" text-anchor="middle">MinIO :19000 (S3 호환)</text>
  <text class="sub"   x="1230" y="402" font-size="10.5" text-anchor="middle">백업 원격 보관 — 3-2-1 오프사이트</text>
  <text class="sub"   x="1230" y="420" font-size="10.5" text-anchor="middle">성공 백업 자동 업로드(remote_location)</text>
  <path class="a-req" d="M1040 400 L1084 400"/>
  <polygon class="h-req" points="1084,400 1074,395 1074,405"/>

  <rect class="card" x="1090" y="480" width="280" height="118" rx="10"/>
  <text class="title" x="1230" y="506" font-size="13" text-anchor="middle">AI 백엔드 (폴백 체인)</text>
  <text class="sub"   x="1230" y="528" font-size="10.5" text-anchor="middle">1. ANTHROPIC_API_KEY 있으면 공식 SDK</text>
  <text class="sub"   x="1230" y="546" font-size="10.5" text-anchor="middle">2. 없으면 claude CLI headless(-p) 폴백</text>
  <text class="sub"   x="1230" y="564" font-size="10.5" text-anchor="middle">3. 둘 다 없으면 OFF — 규칙 기반만 발송</text>
  <path class="a-req" d="M1040 530 L1084 530"/>
  <polygon class="h-req" points="1084,530 1074,525 1074,535"/>
  <text class="label" x="1062" y="518" font-size="10" text-anchor="middle">AiAnalyzer</text>

  <rect class="card" x="1090" y="630" width="280" height="120" rx="10"/>
  <text class="title" x="1230" y="656" font-size="13" text-anchor="middle">관측 스택 (그대로 씀)</text>
  <text class="sub"   x="1230" y="678" font-size="10.5" text-anchor="middle">Prometheus :19090 · Grafana :13000</text>
  <text class="sub"   x="1230" y="696" font-size="10.5" text-anchor="middle">mysqld/postgres exporter가 대상 수집</text>
  <text class="sub"   x="1230" y="714" font-size="10.5" text-anchor="middle">앱 자신도 /actuator/prometheus 노출</text>
  <path class="a-obs" d="M1040 690 L1084 690"/>
  <polygon class="h-res" points="1084,690 1074,685 1074,695"/>
  <path class="a-obs" d="M1020 885 L1230 885 L1230 756"/>
  <polygon class="h-res" points="1230,756 1225,766 1235,766"/>
  <text class="note" x="1128" y="875" font-size="10" text-anchor="middle">exporter 메트릭</text>

  <!-- 범례 -->
  <text class="note" x="700" y="985" font-size="11" text-anchor="middle">실선: 요청·수집·저장 경로 / 점선: 메트릭 관측 경로 · 포트는 docker-compose(.yml/.app.yml) 호스트 매핑</text>
  <text class="note" x="700" y="1006" font-size="11" text-anchor="middle">모듈 간 순환 의존은 ModularityTests가 빌드에서 실패시킨다 — 의존은 아래 방향(채널 → 도메인 → 분석 → 어댑터) 한쪽뿐</text>
</svg>
