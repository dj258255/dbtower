<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 1040" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <style>
    .bg    { fill:#ffffff; }
    .grp1  { fill:#eef2ff; stroke:#c7d2fe; }
    .grp2  { fill:#ecfdf5; stroke:#a7f3d0; }
    .grp3  { fill:#fffbeb; stroke:#fde68a; }
    .grp4  { fill:#fdf2f8; stroke:#fbcfe8; }
    .tbl   { fill:#ffffff; stroke:#94a3b8; }
    .th    { fill:#e2e8f0; stroke:#94a3b8; }
    .title { fill:#0f172a; font-weight:700; }
    .tname { fill:#0f172a; font-weight:700; }
    .sub   { fill:#475569; }
    .col   { fill:#334155; }
    .key   { fill:#4338ca; font-weight:700; }
    .fk    { fill:#047857; font-weight:700; }
    .idx   { fill:#b45309; }
    .gname { fill:#4338ca; font-weight:700; }
    .note  { fill:#64748b; }
    .rel   { stroke:#6366f1; fill:none; stroke-width:1.8; }
    .rel2  { stroke:#94a3b8; fill:none; stroke-width:1.6; stroke-dasharray:5 4; }
    .h-rel { fill:#6366f1; }
    .h-rel2{ fill:#94a3b8; }
    .rlbl  { fill:#4338ca; font-weight:600; }
    @media (prefers-color-scheme: dark) {
      .bg    { fill:#0b1220; }
      .grp1  { fill:#1e1b4b; stroke:#3730a3; }
      .grp2  { fill:#052e2b; stroke:#134e4a; }
      .grp3  { fill:#2a2005; stroke:#713f12; }
      .grp4  { fill:#500724; stroke:#831843; }
      .tbl   { fill:#111827; stroke:#475569; }
      .th    { fill:#1f2937; stroke:#475569; }
      .title { fill:#e2e8f0; }
      .tname { fill:#e2e8f0; }
      .sub   { fill:#94a3b8; }
      .col   { fill:#cbd5e1; }
      .key   { fill:#a5b4fc; }
      .fk    { fill:#34d399; }
      .idx   { fill:#fbbf24; }
      .gname { fill:#a5b4fc; }
      .note  { fill:#94a3b8; }
      .rel   { stroke:#818cf8; }
      .rel2  { stroke:#64748b; }
      .h-rel { fill:#818cf8; }
      .h-rel2{ fill:#64748b; }
      .rlbl  { fill:#a5b4fc; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="1460" height="1040" rx="14"/>
  <text class="title" x="730" y="36" font-size="18" text-anchor="middle">DBTower 메타 DB ERD — Flyway V1~V26 스키마 중 핵심 표 9개(OAuth·매핑 등 확장 표 생략)</text>
  <text class="sub"   x="730" y="58" font-size="12.5" text-anchor="middle">PK/UQ/FK/IDX만 표기 · FK 5개는 전부 V10에서 일괄 추가(ON DELETE CASCADE — 인스턴스 삭제 시 자식 자동 정리)</text>

  <!-- ===== 그룹: 백업 (왼쪽) ===== -->
  <rect class="grp3" x="50" y="86" width="440" height="474" rx="12"/>
  <text class="gname" x="70" y="112" font-size="13">백업 — backup 모듈</text>

  <!-- backup_policy_entity -->
  <rect class="tbl" x="80" y="128" width="380" height="150" rx="8"/>
  <rect class="th"  x="80" y="128" width="380" height="30" rx="8"/>
  <rect class="th"  x="80" y="148" width="380" height="10"/>
  <text class="tname" x="92" y="148" font-size="12.5">backup_policy_entity</text>
  <text class="sub" x="448" y="148" font-size="10.5" text-anchor="end">V1 · V10</text>
  <text class="key" x="92" y="176" font-size="11">id  BIGINT  PK</text>
  <text class="fk"  x="92" y="194" font-size="11">instance_id  BIGINT  FK · UQ(인스턴스당 1개)</text>
  <text class="col" x="92" y="212" font-size="11">interval_minutes  INTEGER</text>
  <text class="col" x="92" y="230" font-size="11">type  VARCHAR  CHECK(FULL/LOG)</text>
  <text class="col" x="92" y="248" font-size="11">enabled  BOOLEAN</text>
  <text class="col" x="92" y="266" font-size="11">last_run_at  TIMESTAMP(6)</text>

  <!-- backup_run -->
  <rect class="tbl" x="80" y="308" width="380" height="222" rx="8"/>
  <rect class="th"  x="80" y="308" width="380" height="30" rx="8"/>
  <rect class="th"  x="80" y="328" width="380" height="10"/>
  <text class="tname" x="92" y="328" font-size="12.5">backup_run</text>
  <text class="sub" x="448" y="328" font-size="10.5" text-anchor="end">V1 · V4 · V7 · V10</text>
  <text class="key" x="92" y="356" font-size="11">id  BIGINT  PK</text>
  <text class="fk"  x="92" y="374" font-size="11">instance_id  BIGINT  FK</text>
  <text class="col" x="92" y="392" font-size="11">started_at  TIMESTAMP(6)</text>
  <text class="col" x="92" y="410" font-size="11">duration_ms  BIGINT</text>
  <text class="col" x="92" y="428" font-size="11">status  VARCHAR  CHECK(SUCCESS/FAILED)</text>
  <text class="col" x="92" y="446" font-size="11">detail  VARCHAR(1000)</text>
  <text class="col" x="92" y="464" font-size="11">location  VARCHAR(1000)  — 산출물 위치 (V4)</text>
  <text class="col" x="92" y="482" font-size="11">verify_status  VARCHAR(20)  — 복원 검증 (V4)</text>
  <text class="col" x="92" y="500" font-size="11">verified_at  TIMESTAMP(6)  (V4)</text>
  <text class="col" x="92" y="518" font-size="11">remote_location  VARCHAR(512)  — 오프사이트 (V7)</text>

  <!-- ===== 그룹: 레지스트리 (가운데) ===== -->
  <rect class="grp1" x="530" y="86" width="400" height="360" rx="12"/>
  <text class="gname" x="550" y="112" font-size="13">레지스트리 — 모든 자식 표의 부모</text>

  <!-- database_instance -->
  <rect class="tbl" x="560" y="128" width="340" height="240" rx="8"/>
  <rect class="th"  x="560" y="128" width="340" height="30" rx="8"/>
  <rect class="th"  x="560" y="148" width="340" height="10"/>
  <text class="tname" x="572" y="148" font-size="12.5">database_instance</text>
  <text class="sub" x="888" y="148" font-size="10.5" text-anchor="end">V1 · V6 · V9</text>
  <text class="key" x="572" y="176" font-size="11">id  BIGINT  PK</text>
  <text class="col" x="572" y="194" font-size="11">name  VARCHAR(255)  UQ</text>
  <text class="col" x="572" y="212" font-size="11">type  VARCHAR  CHECK(5기종 enum)</text>
  <text class="col" x="572" y="230" font-size="11">host / port / db_name / username</text>
  <text class="col" x="572" y="248" font-size="11">password  VARCHAR  — AES-256-GCM 암호화 저장</text>
  <text class="col" x="572" y="266" font-size="11">use_tls  BOOLEAN  — TLS 강제 서비스 대응 (V6)</text>
  <text class="col" x="572" y="284" font-size="11">collection_enabled  BOOLEAN  — 격리 토글 (V9)</text>
  <text class="col" x="572" y="302" font-size="11">created_at  TIMESTAMP(6)</text>
  <text class="note" x="572" y="330" font-size="10.5">type CHECK는 5기종 전부 — enum 확장이 제약에</text>
  <text class="note" x="572" y="346" font-size="10.5">막혔던 사고(18-3)의 재발 방지 흔적</text>

  <!-- ===== 그룹: 관측 시계열 (오른쪽) ===== -->
  <rect class="grp2" x="970" y="86" width="440" height="620" rx="12"/>
  <text class="gname" x="990" y="112" font-size="13">관측 시계열 — 폴러가 쌓고 보존 정리가 지운다</text>

  <!-- query_snapshot -->
  <rect class="tbl" x="1000" y="128" width="380" height="204" rx="8"/>
  <rect class="th"  x="1000" y="128" width="380" height="30" rx="8"/>
  <rect class="th"  x="1000" y="148" width="380" height="10"/>
  <text class="tname" x="1012" y="148" font-size="12.5">query_snapshot</text>
  <text class="sub" x="1368" y="148" font-size="10.5" text-anchor="end">V1 · V10</text>
  <text class="key" x="1012" y="176" font-size="11">id  BIGINT  PK</text>
  <text class="fk"  x="1012" y="194" font-size="11">instance_id  BIGINT  FK</text>
  <text class="col" x="1012" y="212" font-size="11">captured_at  TIMESTAMP(6)</text>
  <text class="col" x="1012" y="230" font-size="11">query_id  VARCHAR(64)  — 정규화 다이제스트</text>
  <text class="col" x="1012" y="248" font-size="11">query_text  VARCHAR(4000)</text>
  <text class="col" x="1012" y="266" font-size="11">calls  BIGINT · total_time_ms  DOUBLE</text>
  <text class="col" x="1012" y="284" font-size="11">rows_examined  BIGINT</text>
  <text class="idx" x="1012" y="312" font-size="10.5">IDX (instance_id, captured_at) — 등치 선두, 343배 실측</text>

  <!-- plan_snapshot -->
  <rect class="tbl" x="1000" y="362" width="380" height="168" rx="8"/>
  <rect class="th"  x="1000" y="362" width="380" height="30" rx="8"/>
  <rect class="th"  x="1000" y="382" width="380" height="10"/>
  <text class="tname" x="1012" y="382" font-size="12.5">plan_snapshot</text>
  <text class="sub" x="1368" y="382" font-size="10.5" text-anchor="end">V8 · V10</text>
  <text class="key" x="1012" y="410" font-size="11">id  BIGSERIAL  PK</text>
  <text class="fk"  x="1012" y="428" font-size="11">instance_id  BIGINT  FK</text>
  <text class="col" x="1012" y="446" font-size="11">query_id  VARCHAR(255)</text>
  <text class="col" x="1012" y="464" font-size="11">plan_hash  VARCHAR(64)  — 플랜 변경(flip) 감지 키</text>
  <text class="col" x="1012" y="482" font-size="11">plan_shape  VARCHAR(2000) · captured_at</text>
  <text class="idx" x="1012" y="510" font-size="10.5">IDX (instance_id, query_id, captured_at DESC)</text>

  <!-- health_sample -->
  <rect class="tbl" x="1000" y="560" width="380" height="130" rx="8"/>
  <rect class="th"  x="1000" y="560" width="380" height="30" rx="8"/>
  <rect class="th"  x="1000" y="580" width="380" height="10"/>
  <text class="tname" x="1012" y="580" font-size="12.5">health_sample</text>
  <text class="sub" x="1368" y="580" font-size="10.5" text-anchor="end">V5 · V10</text>
  <text class="key" x="1012" y="608" font-size="11">id  BIGINT  PK</text>
  <text class="fk"  x="1012" y="626" font-size="11">instance_id  BIGINT  FK</text>
  <text class="col" x="1012" y="644" font-size="11">sampled_at · up  BOOLEAN · ping_millis  BIGINT</text>
  <text class="idx" x="1012" y="672" font-size="10.5">IDX (instance_id, sampled_at) — 에러 버짓 윈도우 집계</text>

  <!-- ===== 관계선 ===== -->
  <!-- database_instance -> query_snapshot -->
  <path class="rel" d="M900 190 L994 190"/>
  <polygon class="h-rel" points="906,190 916,185 916,195"/>
  <text class="rlbl" x="947" y="180" font-size="10" text-anchor="middle">1 : N · CASCADE</text>
  <!-- database_instance -> plan_snapshot -->
  <path class="rel" d="M900 250 L950 250 L950 430 L994 430"/>
  <polygon class="h-rel" points="906,250 916,245 916,255"/>
  <text class="rlbl" x="962" y="352" font-size="10" text-anchor="middle" transform="rotate(90 962 352)">1 : N · CASCADE</text>
  <!-- database_instance -> health_sample -->
  <path class="rel" d="M900 310 L935 310 L935 626 L994 626"/>
  <polygon class="h-rel" points="906,310 916,305 916,315"/>
  <text class="rlbl" x="923" y="500" font-size="10" text-anchor="middle" transform="rotate(90 923 500)">1 : N · CASCADE</text>
  <!-- database_instance -> backup_policy_entity -->
  <path class="rel" d="M560 190 L466 190"/>
  <polygon class="h-rel" points="554,190 544,185 544,195"/>
  <text class="rlbl" x="513" y="180" font-size="10" text-anchor="middle">1 : 1 (UQ) · CASCADE</text>
  <!-- database_instance -> backup_run -->
  <path class="rel" d="M560 250 L510 250 L510 374 L466 374"/>
  <polygon class="h-rel" points="554,250 544,245 544,255"/>
  <text class="rlbl" x="498" y="315" font-size="10" text-anchor="middle" transform="rotate(90 498 315)">1 : N · CASCADE</text>
  <!-- audit_event 느슨한 참조 -->
  <path class="rel2" d="M700 368 L700 712 L1080 712 L1080 770"/>
  <text class="note" x="715" y="596" font-size="10.5">audit_event.instance_id — 느슨한 참조</text>
  <text class="note" x="715" y="614" font-size="10.5">(FK 없음 — 감사 기록은 삭제와 무관하게 보존)</text>

  <!-- ===== 그룹: 플랫폼·감사 (하단, FK 없는 독립 표) ===== -->
  <rect class="grp4" x="50" y="726" width="1360" height="250" rx="12"/>
  <text class="gname" x="70" y="752" font-size="13">플랫폼·감사 — 의도적으로 FK 없는 독립 표</text>

  <!-- platform_user -->
  <rect class="tbl" x="80" y="770" width="360" height="114" rx="8"/>
  <rect class="th"  x="80" y="770" width="360" height="30" rx="8"/>
  <rect class="th"  x="80" y="790" width="360" height="10"/>
  <text class="tname" x="92" y="790" font-size="12.5">platform_user</text>
  <text class="sub" x="428" y="790" font-size="10.5" text-anchor="end">V1</text>
  <text class="key" x="92" y="818" font-size="11">id  BIGINT  PK</text>
  <text class="col" x="92" y="836" font-size="11">username  VARCHAR(255)  UQ</text>
  <text class="col" x="92" y="854" font-size="11">password_hash  VARCHAR(255)  — BCrypt</text>
  <text class="col" x="92" y="872" font-size="11">role  VARCHAR  CHECK(VIEWER/ADMIN)</text>
  <text class="note" x="92" y="906" font-size="10.5">플랫폼 사용자 — 관제 대상 DB 계정과 별개</text>

  <!-- shedlock -->
  <rect class="tbl" x="480" y="770" width="360" height="114" rx="8"/>
  <rect class="th"  x="480" y="770" width="360" height="30" rx="8"/>
  <rect class="th"  x="480" y="790" width="360" height="10"/>
  <text class="tname" x="492" y="790" font-size="12.5">shedlock</text>
  <text class="sub" x="828" y="790" font-size="10.5" text-anchor="end">V3</text>
  <text class="key" x="492" y="818" font-size="11">name  VARCHAR(64)  PK  — 락 이름</text>
  <text class="col" x="492" y="836" font-size="11">lock_until  TIMESTAMP  — 보유 만료(크래시 회수)</text>
  <text class="col" x="492" y="854" font-size="11">locked_at  TIMESTAMP</text>
  <text class="col" x="492" y="872" font-size="11">locked_by  VARCHAR(255)  — 노드 식별자</text>
  <text class="note" x="492" y="906" font-size="10.5">HA 다중 노드에서 @Scheduled 폴러 분산 락</text>

  <!-- audit_event -->
  <rect class="tbl" x="880" y="770" width="500" height="186" rx="8"/>
  <rect class="th"  x="880" y="770" width="500" height="30" rx="8"/>
  <rect class="th"  x="880" y="790" width="500" height="10"/>
  <text class="tname" x="892" y="790" font-size="12.5">audit_event</text>
  <text class="sub" x="1368" y="790" font-size="10.5" text-anchor="end">V2</text>
  <text class="key" x="892" y="818" font-size="11">id  BIGINT  PK</text>
  <text class="col" x="892" y="836" font-size="11">occurred_at  TIMESTAMP(6)</text>
  <text class="col" x="892" y="854" font-size="11">principal  VARCHAR(255)  — 사용자명 또는 'api-token'</text>
  <text class="col" x="892" y="872" font-size="11">role  VARCHAR  — CHECK 없음(역할 확장 결합 회피, NULL 허용)</text>
  <text class="col" x="892" y="890" font-size="11">action  VARCHAR(500)  — 'POST /api/instances' 꼴 · instance_id  BIGINT</text>
  <text class="col" x="892" y="908" font-size="11">outcome  INTEGER  — HTTP 상태 · duration_ms  BIGINT</text>
  <text class="idx" x="892" y="936" font-size="10.5">IDX (occurred_at) — 최신 N건·기간 검색</text>

  <text class="note" x="730" y="1004" font-size="11" text-anchor="middle">근거: src/main/resources/db/migration/V1~V26 (JPA 엔티티는 ddl-auto=validate로 검증만) · verify_status·audit role에 CHECK가 없는 것은 값 추가 때 제약 재생성 마이그레이션이 필요해지는 결합을 피한 의도적 선택</text>
</svg>
