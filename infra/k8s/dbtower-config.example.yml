# 등록 Job이 쓰는 DBTower 접속 정보. 이 파일을 dbtower-config.yml로 복사해 실값을 채운다.
# dbtower-config.yml은 커밋되지 않는다(.gitignore: infra/k8s/*-secret.yml — 아래 파일명 규칙 참고).
apiVersion: v1
kind: Secret
metadata:
  name: dbtower-config-secret
stringData:
  DBTOWER_URL: "http://host.docker.internal:8080"   # 클러스터에서 호스트의 DBTower를 가리키는 예
  DBTOWER_TOKEN: "CHANGE_ME"                          # ADMIN Bearer 토큰
